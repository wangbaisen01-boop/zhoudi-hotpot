<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>粥底火锅 · 扫码点餐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans SC',sans-serif;background:#f5f0eb;color:#2d2420;padding-bottom:80px;min-height:100vh}
.screen{display:none;padding:0 16px 100px;animation:fadeUp .3s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ===== Home ===== */
.screen-home{padding:0}

.hero{
  background:linear-gradient(160deg,#c57b57 0%,#a8643f 60%,#8b4f32 100%);
  padding:48px 24px 36px;text-align:center;color:#fff;position:relative;
  border-radius:0 0 28px 28px
}
.hero::after{
  content:'';position:absolute;bottom:-8px;left:0;right:0;height:16px;
  background:linear-gradient(135deg,#c57b57 0%,transparent 50%,#c57b57 100%);opacity:.15
}
.hero .brand-icon{font-size:52px;margin-bottom:4px;display:block}
.hero h1{font-size:34px;font-weight:900;letter-spacing:2px}
.hero p{font-size:13px;opacity:.7;margin-top:4px;letter-spacing:3px}
.hero-tags{display:flex;justify-content:center;gap:20px;margin-top:20px;font-size:12px;opacity:.85}
.hero-tags span{display:flex;align-items:center;gap:4px}
.start-btn{
  display:block;width:180px;margin:28px auto 0;padding:14px 0;
  background:#fff;color:#c57b57;border:none;border-radius:28px;
  font-size:17px;font-weight:700;cursor:pointer;
  box-shadow:0 6px 20px rgba(0,0,0,.15);transition:transform .15s
}
.start-btn:active{transform:scale(.96)}
.hero-footer{text-align:center;color:rgba(255,255,255,.45);font-size:11px;margin-top:20px}

/* ===== Table ===== */
.screen-table{padding-top:24px}
.screen-table h2{font-size:20px;font-weight:700;text-align:center}
.screen-table .hint{text-align:center;font-size:13px;color:#999;margin:4px 0 20px}
.table-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:340px;margin:0 auto}
.table-btn{
  aspect-ratio:1;border:2px solid #e8e0d9;border-radius:14px;background:#fff;
  font-size:22px;font-weight:700;color:#2d2420;cursor:pointer;transition:all .15s;
  display:flex;flex-direction:column;align-items:center;justify-content:center
}
.table-btn .icon{font-size:18px;margin-bottom:2px}
.table-btn.selected{border-color:#c57b57;background:#fdf8f3}

/* ===== Menu ===== */
.menu-top{display:flex;justify-content:space-between;align-items:center;padding:16px 0 0}
.menu-top h2{font-size:20px;font-weight:700}
.menu-top .table-tag{
  font-size:12px;background:#c57b57;color:#fff;padding:4px 12px;
  border-radius:14px;font-weight:500
}
.cat-scroll{display:flex;overflow-x:auto;gap:8px;padding:12px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-tab{
  flex-shrink:0;padding:7px 16px;border-radius:18px;font-size:13px;font-weight:500;
  border:1.5px solid #e8e0d9;background:#fff;color:#666;cursor:pointer;white-space:nowrap
}
.cat-tab.active{background:#c57b57;color:#fff;border-color:#c57b57}
.dish-list{padding-top:4px}
.dish-card{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f0ebe6;align-items:center}
.dish-img{
  width:72px;height:72px;border-radius:12px;background:#f5f0eb;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:30px
}
.dish-info{flex:1;min-width:0}
.dish-name{font-size:15px;font-weight:600}
.dish-desc{font-size:12px;color:#999;margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.dish-bot{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.dish-price{font-size:16px;font-weight:700;color:#c57b57}
.dish-price::before{content:'¥';font-size:12px}
.dish-qty{display:flex;align-items:center;gap:10px}
.dish-qty button{
  width:26px;height:26px;border-radius:50%;border:none;font-size:16px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .1s
}
.dish-qty button:active{transform:scale(.9)}
.btn-minus{background:#f0ebe6;color:#666}
.btn-plus{background:#c57b57;color:#fff}
.dish-qty .num{font-size:15px;font-weight:600;min-width:18px;text-align:center;color:#2d2420}

/* ===== Cart Float ===== */
.cart-float{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  max-width:420px;width:calc(100% - 24px);background:#2d2420;border-radius:22px;
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 6px 28px rgba(0,0,0,.35);z-index:100;cursor:pointer
}
.cart-left{display:flex;align-items:center;gap:10px}
.cart-icon-wrap{
  width:38px;height:38px;background:#c57b57;border-radius:50%;
  display:flex;align-items:center;justify-content:center;position:relative
}
.cart-icon-wrap .badge{
  position:absolute;top:-5px;right:-5px;background:#e74c3c;color:#fff;
  font-size:10px;width:18px;height:18px;border-radius:50%;
  display:none;align-items:center;justify-content:center;font-weight:700
}
.cart-icon-wrap .badge.show{display:flex}
.cart-text{color:rgba(255,255,255,.6);font-size:12px}
.cart-text strong{color:#fff;font-size:14px}
.cart-summary{color:#ffd4b0;font-size:17px;font-weight:700}
.cart-summary small{font-size:12px}

/* ===== Cart Panel ===== */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;
  opacity:0;pointer-events:none;transition:opacity .25s
}
.overlay.show{opacity:1;pointer-events:auto}
.cart-panel{
  position:fixed;bottom:0;left:0;right:0;max-width:420px;margin:0 auto;
  background:#fff;border-radius:20px 20px 0 0;z-index:200;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.67,0);
  max-height:65vh;display:flex;flex-direction:column;
  box-shadow:0 -4px 30px rgba(0,0,0,.12)
}
.cart-panel.open{transform:translateY(0)}
.cart-panel .handle{text-align:center;padding:8px;cursor:pointer}
.cart-panel .handle::before{
  content:'';display:block;width:36px;height:4px;border-radius:2px;background:#ddd;margin:0 auto
}
.cp-head{display:flex;justify-content:space-between;padding:0 20px 10px;font-size:16px;font-weight:600}
.cp-head button{border:none;background:none;color:#c57b57;font-size:13px;cursor:pointer}
.cp-items{flex:1;overflow-y:auto;padding:0 16px}
.cp-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f5f0eb}
.cp-item-l{flex:1}
.cp-item-name{font-size:13px;font-weight:500}
.cp-item-price{font-size:12px;color:#c57b57;margin-top:1px}
.cp-qty{display:flex;align-items:center;gap:10px}
.cp-qty button{
  width:24px;height:24px;border-radius:50%;border:1px solid #ddd;background:#fff;
  font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center
}
.cp-qty span{font-size:14px;font-weight:500;min-width:18px;text-align:center}
.cp-foot{padding:12px 16px;border-top:1px solid #f0ebe6;display:flex;justify-content:space-between;align-items:center}
.cp-foot .total{font-size:13px;color:#666}
.cp-foot .total strong{font-size:20px;color:#c57b57}
.go-checkout{
  padding:11px 28px;border:none;border-radius:22px;background:linear-gradient(135deg,#c57b57,#a8643f);
  color:#fff;font-size:15px;font-weight:600;cursor:pointer
}

/* ===== Checkout ===== */
.screen-checkout{padding-top:20px}
.screen-checkout h2{font-size:20px;font-weight:700;margin-bottom:16px}
.ord-sec{margin-bottom:18px}
.ord-sec h3{font-size:13px;color:#888;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ord-table{background:#faf8f6;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.ord-table .num{background:#c57b57;color:#fff;padding:4px 14px;border-radius:14px;font-size:14px;font-weight:600}
.ord-note{
  width:100%;border:1.5px solid #e8e0d9;border-radius:10px;padding:10px 12px;
  font-size:14px;font-family:inherit;resize:none;outline:none;
  transition:border-color .2s
}
.ord-note:focus{border-color:#c57b57}
.ord-detail{background:#faf8f6;border-radius:10px;padding:14px}
.ord-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:#666}
.ord-row.tot{border-top:1px solid #e8e0d9;margin-top:8px;padding-top:10px;font-size:15px;font-weight:700;color:#2d2420}
.ord-row.tot span:last-child{color:#c57b57;font-size:20px}
.submit-btn{
  display:block;width:100%;padding:15px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#c57b57,#a8643f);color:#fff;
  font-size:17px;font-weight:700;cursor:pointer;margin-top:18px;
  box-shadow:0 4px 16px rgba(197,123,87,.3)
}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.submit-btn:active:not(:disabled){opacity:.9}

/* ===== Success ===== */
.screen-success{padding-top:60px;text-align:center}
.screen-success .icon{font-size:64px;margin-bottom:8px}
.screen-success h2{font-size:22px;font-weight:700}
.screen-success>p{color:#888;margin-top:6px;font-size:14px}
.ord-card{
  background:#faf8f6;border-radius:12px;padding:16px;margin:24px 0;text-align:left
}
.ord-card .row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;color:#555}
.ord-card .row .label{color:#999}
.ord-card .row .val{font-weight:500;color:#2d2420}

/* ===== Loading ===== */
.loading-overlay{
  position:fixed;inset:0;background:rgba(45,36,32,.7);z-index:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff
}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Empty Cart ===== */
.empty-cart{text-align:center;padding:40px 0;color:#bbb;font-size:14px}

/* ===== Toast ===== */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:#2d2420;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;
  z-index:400;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap
}
.toast.show{opacity:1}
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- ===== Loading ===== -->
<div class="loading-overlay" id="loading" style="display:none">
  <div class="spinner"></div>
  <span>正在提交订单…</span>
</div>

<!-- ===== Toast ===== -->
<div class="toast" id="toast"></div>

<!-- ===== Screen 0: Home ===== -->
<div class="screen screen-home active" id="s0">
  <div class="hero">
    <span class="brand-icon">🍲</span>
    <h1>粥底火锅</h1>
    <p>— 米汤为底 · 鲜滑入魂 —</p>
    <div class="hero-tags">
      <span>🥩 精选鲜肉</span>
      <span>🦐 生猛海鲜</span>
      <span>🥬 时令蔬菜</span>
    </div>
    <button class="start-btn" onclick="goTable()">开始点餐 →</button>
    <div class="hero-footer">扫码点餐 · 在线支付 · 快捷方便</div>
  </div>
</div>

<!-- ===== Screen 1: Table ===== -->
<div class="screen" id="s1">
  <div style="padding-top:24px;text-align:center">
    <h2 style="font-size:20px;font-weight:700">选择桌号 🪑</h2>
    <p style="font-size:13px;color:#999;margin:4px 0 20px">请选择您所在的桌号</p>
    <div class="table-grid" id="tableGrid"></div>
  </div>
</div>

<!-- ===== Screen 2: Menu ===== -->
<div class="screen" id="s2">
  <div class="menu-top">
    <h2>菜单 📋</h2>
    <span class="table-tag" id="menuTableTag">未选桌</span>
  </div>
  <div class="cat-scroll" id="catScroll"></div>
  <div class="dish-list" id="dishList"></div>
</div>

<!-- ===== Screen 3: Checkout ===== -->
<div class="screen" id="s3">
  <h2 style="font-size:20px;font-weight:700;padding-top:20px">确认订单 📝</h2>
  <div class="ord-sec">
    <h3>📍 桌号</h3>
    <div class="ord-table"><span class="num" id="checkoutTableNum">未选桌</span><span style="color:#888;font-size:13px">大厅</span></div>
  </div>
  <div class="ord-sec">
    <h3>📝 备注</h3>
    <textarea class="ord-note" id="orderNote" rows="2" placeholder="有什么特殊需求？如：少辣、不要香菜…"></textarea>
  </div>
  <div class="ord-sec">
    <h3>🧾 订单明细</h3>
    <div class="ord-detail" id="orderDetail"></div>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="submitOrder()">提交订单</button>
</div>

<!-- ===== Screen 4: Success ===== -->
<div class="screen screen-success" id="s4">
  <div class="icon">✅</div>
  <h2>下单成功！</h2>
  <p>订单已发送到厨房</p>
  <div class="ord-card" id="successCard"></div>
  <button class="start-btn" onclick="goMenu()" style="margin-top:0;display:inline-block">继续加菜</button>
  <button class="start-btn" onclick="goHome()" style="background:transparent;color:#c57b57;box-shadow:none;margin-top:8px">返回首页</button>
</div>

<!-- ===== Cart Float ===== -->
<div class="cart-float" id="cartFloat" style="display:none" onclick="toggleCart()">
  <div class="cart-left">
    <div class="cart-icon-wrap">
      <span>🛒</span>
      <div class="badge" id="cartBadge">0</div>
    </div>
    <div class="cart-text"><strong>购物车</strong><br>共 <span id="cartCount">0</span> 件</div>
  </div>
  <div class="cart-summary">¥<small id="cartTotal">0</small></div>
</div>

<!-- ===== Cart Panel ===== -->
<div class="overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-panel" id="cartPanel">
  <div class="handle"></div>
  <div class="cp-head"><span>购物车</span><button onclick="clearCart()">清空</button></div>
  <div class="cp-items" id="cpItems"></div>
  <div class="cp-foot">
    <div class="total">合计 <strong id="cpTotal">¥0</strong></div>
    <button class="go-checkout" onclick="goCheckout()">去结算</button>
  </div>
</div>

<script>
// ===== DATA =====
const CATEGORIES = [
  {id:'pot',name:'🔥 锅底'},{id:'meat',name:'🥩 肉类'},{id:'seafood',name:'🦐 海鲜'},
  {id:'ball',name:'⚪ 丸滑'},{id:'veg',name:'🥬 蔬菜'},{id:'bean',name:'🫘 豆面'},
  {id:'snack',name:'🥟 小吃'},{id:'drink',name:'🥤 饮品'},{id:'rice',name:'🍚 主食'}
];
const DISHES = {
  pot:[
    {name:'招牌粥底锅',price:38,desc:'米汤慢熬，搭配海鲜贝类提鲜，锅开先喝汤',emoji:'🥣'},
    {name:'麻辣粥底锅',price:42,desc:'在粥底基础上加入麻辣锅底，鲜辣交融',emoji:'🌶️'},
    {name:'番茄粥底锅',price:40,desc:'酸甜番茄汤底搭配粥底，开胃暖身',emoji:'🍅'}
  ],
  meat:[
    {name:'雪花肥牛',price:48,desc:'精选雪花肥牛，涮8秒即食，入口即化',emoji:'🥩'},
    {name:'鲜切羊肉',price:46,desc:'新鲜羊肉现切，鲜嫩不膻',emoji:'🐑'},
    {name:'猪梅花肉',price:36,desc:'猪梅花肉薄切，肉质鲜嫩多汁',emoji:'🐷'},
    {name:'嫩滑鸡片',price:32,desc:'鸡胸肉片腌制，涮后嫩滑爽口',emoji:'🐔'},
    {name:'手切鲜牛肉',price:56,desc:'当日鲜牛肉手工现切，肉味浓郁',emoji:'🥩'}
  ],
  seafood:[
    {name:'鲜虾滑',price:36,desc:'手工现打虾滑，Q弹鲜甜',emoji:'🦐'},
    {name:'生鱼片',price:42,desc:'新鲜现切生鱼片，粥底涮食鲜嫩无比',emoji:'🐟'},
    {name:'鲜鲍鱼',price:68,desc:'鲜活小鲍鱼，涮粥底鲜美至极',emoji:'🐚'},
    {name:'白贝',price:28,desc:'新鲜白贝，搭配粥底提鲜一绝',emoji:'🦪'},
    {name:'墨鱼仔',price:38,desc:'新鲜墨鱼仔，口感爽脆鲜甜',emoji:'🦑'}
  ],
  ball:[
    {name:'手打牛肉丸',price:32,desc:'纯手工捶打牛肉丸，弹牙爆汁',emoji:'⚪'},
    {name:'鲜虾丸',price:34,desc:'虾肉含量90%以上，鲜甜弹滑',emoji:'🦐'},
    {name:'墨鱼丸',price:30,desc:'墨鱼肉手工制作，口感爽弹',emoji:'🦑'},
    {name:'鱼豆腐',price:18,desc:'嫩滑鱼豆腐，吸满汤汁更美味',emoji:'🧈'}
  ],
  veg:[
    {name:'蔬菜拼盘',price:22,desc:'时令蔬菜拼盘，清爽解腻',emoji:'🥬'},
    {name:'菌菇拼盘',price:28,desc:'多种菌菇搭配，鲜味加倍',emoji:'🍄'},
    {name:'玉米',price:12,desc:'甜玉米切段，粥底煮后鲜甜',emoji:'🌽'},
    {name:'土豆片',price:10,desc:'新鲜土豆切薄片，涮煮皆宜',emoji:'🥔'}
  ],
  bean:[
    {name:'鲜豆腐',price:10,desc:'嫩豆腐，吸满粥底汤汁',emoji:'🫘'},
    {name:'炸腐竹',price:16,desc:'炸腐竹，三秒即食，酥脆与汤汁并存',emoji:'🥟'},
    {name:'宽粉',price:12,desc:'红薯宽粉，Q弹爽滑',emoji:'🍜'},
    {name:'油条',price:8,desc:'现炸油条，泡粥吃是一绝',emoji:'🥖'}
  ],
  snack:[
    {name:'凉拌黄瓜',price:12,desc:'爽脆可口的开胃凉菜',emoji:'🥒'},
    {name:'泡椒凤爪',price:18,desc:'酸辣开胃，停不下来',emoji:'🐔'},
    {name:'炸春卷',price:15,desc:'金黄酥脆，内馅鲜美',emoji:'🥟'}
  ],
  drink:[
    {name:'酸梅汤',price:8,desc:'自制酸梅汤，解腻消暑',emoji:'🥤'},
    {name:'王老吉',price:6,desc:'经典凉茶饮料',emoji:'🟡'},
    {name:'椰汁',price:10,desc:'清甜椰汁，解辣必备',emoji:'🥥'},
    {name:'啤酒',price:12,desc:'冰镇啤酒，火锅绝配',emoji:'🍺'}
  ],
  rice:[
    {name:'米饭',price:3,desc:'精选大米现蒸',emoji:'🍚'},
    {name:'杂粮粥',price:8,desc:'多种杂粮慢熬',emoji:'🥣'}
  ]
};

// ===== STATE =====
let selectedTable = 0;
let cart = {}; // { 'name': {name, price, qty, emoji, category} }
let currentCat = 'pot';
let currentOrder = null;

// ===== INIT =====
function init() {
  renderTables();
  renderCategories();
  renderDishes('pot');
}
init();

// ===== TABLES =====
function renderTables() {
  const g = document.getElementById('tableGrid');
  for(let i=1;i<=12;i++){
    const btn=document.createElement('div');
    btn.className='table-btn';
    btn.innerHTML='<span class="icon">🪑</span>'+i;
    btn.onclick=()=>selectTable(i);
    g.appendChild(btn);
  }
}
function selectTable(n){
  selectedTable=n;
  document.querySelectorAll('.table-btn').forEach(b=>b.classList.toggle('selected',parseInt(b.textContent)===n));
  document.getElementById('menuTableTag').textContent=n+'号桌';
  showScreen(2);
}

// ===== CATEGORIES =====
function renderCategories(){
  const s=document.getElementById('catScroll');
  CATEGORIES.forEach((c,i)=>{
    const t=document.createElement('div');
    t.className='cat-tab'+(i===0?' active':'');
    t.textContent=c.name;
    t.onclick=()=>{
      document.querySelectorAll('.cat-tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      currentCat=c.id;
      renderDishes(c.id);
    };
    s.appendChild(t);
  });
}

// ===== DISHES =====
function renderDishes(catId){
  const dl=document.getElementById('dishList');
  dl.innerHTML='';
  (DISHES[catId]||[]).forEach(d=>{
    const card=document.createElement('div');
    card.className='dish-card';
    const qty=cart[d.name]?.qty||0;
    card.innerHTML=`
      <div class="dish-img">${d.emoji}</div>
      <div class="dish-info">
        <div class="dish-name">${d.name}</div>
        <div class="dish-desc">${d.desc||''}</div>
        <div class="dish-bot">
          <span class="dish-price">${d.price}</span>
          <div class="dish-qty" id="dq-${d.name}">
            ${qty>0?`<button class="btn-minus" onclick="decQty('${d.name}',${d.price},'${d.emoji}','${catId}')">−</button><span class="num">${qty}</span>`:''}
            <button class="btn-plus" onclick="incQty('${d.name}',${d.price},'${d.emoji}','${catId}')">+</button>
          </div>
        </div>
      </div>`;
    dl.appendChild(card);
  });
}

// ===== CART =====
function incQty(name,price,emoji,category){
  if(!cart[name]) cart[name]={name,price,emoji,category,qty:0};
  cart[name].qty++;
  updateCart();
  renderDishes(currentCat);
}
function decQty(name){
  if(cart[name]){
    cart[name].qty--;
    if(cart[name].qty<=0) delete cart[name];
  }
  updateCart();
  renderDishes(currentCat);
}
function updateCart(){
  const items=Object.values(cart);
  const count=items.reduce((s,i)=>s+i.qty,0);
  const total=items.reduce((s,i)=>s+i.price*i.qty,0);
  const badge=document.getElementById('cartBadge');
  const cartFloat=document.getElementById('cartFloat');
  if(count>0){
    cartFloat.style.display='flex';
    badge.textContent=count;
    badge.classList.add('show');
    document.getElementById('cartCount').textContent=count;
    document.getElementById('cartTotal').textContent=total;
  }else{
    cartFloat.style.display='none';
    badge.classList.remove('show');
  }
  renderCartPanel();
}
function renderCartPanel(){
  const el=document.getElementById('cpItems');
  const items=Object.values(cart);
  if(!items.length){
    el.innerHTML='<div class="empty-cart">购物车是空的<br>去菜单加点菜吧 🍲</div>';
    document.getElementById('cpTotal').textContent='¥0';
    return;
  }
  let html='';
  items.forEach(i=>{
    html+=`
      <div class="cp-item">
        <div class="cp-item-l">
          <div class="cp-item-name">${i.emoji||''} ${i.name}</div>
          <div class="cp-item-price">¥${i.price}</div>
        </div>
        <div class="cp-qty">
          <button onclick="decQty('${i.name}')">−</button>
          <span>${i.qty}</span>
          <button onclick="incQty('${i.name}',${i.price},'${i.emoji||''}','${i.category}')">+</button>
        </div>
      </div>`;
  });
  el.innerHTML=html;
  const total=items.reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById('cpTotal').textContent='¥'+total;
}

function clearCart(){
  cart={};
  updateCart();
  renderDishes(currentCat);
  document.getElementById('cartPanel').classList.remove('open');
  document.getElementById('cartOverlay').classList.remove('show');
}
function toggleCart(){
  const p=document.getElementById('cartPanel');
  const o=document.getElementById('cartOverlay');
  p.classList.toggle('open');
  o.classList.toggle('show');
}
function goCheckout(){
  toggleCart();
  showCheckout();
}

// ===== CHECKOUT =====
function showCheckout(){
  const items=Object.values(cart);
  if(!items.length){ toast('请先选择菜品'); return; }
  const total=items.reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById('checkoutTableNum').textContent=selectedTable+'号桌';
  let html='';
  items.forEach(i=>{
    html+=`<div class="ord-row"><span>${i.emoji||''} ${i.name} × ${i.qty}</span><span>¥${i.price*i.qty}</span></div>`;
  });
  html+=`<div class="ord-row tot"><span>合计</span><span>¥${total}</span></div>`;
  document.getElementById('orderDetail').innerHTML=html;
  document.getElementById('submitBtn').textContent='提交订单  ¥'+total;
  showScreen(3);
}

// ===== SUBMIT ORDER =====
async function submitOrder(){
  const items=Object.values(cart);
  if(!items.length||!selectedTable){ toast('请先选桌和菜品'); return; }
  const note=document.getElementById('orderNote').value.trim();
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='提交中…';
  document.getElementById('loading').style.display='flex';

  try{
    const payload={
      table_no:selectedTable,
      items:items.map(i=>({name:i.name,price:i.price,qty:i.qty,category:i.category})),
      total_amount:items.reduce((s,i)=>s+i.price*i.qty,0),
      note
    };
    const res=await fetch('/api/order',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    const result=await res.json();
    if(!result.success) throw new Error(result.error||'提交失败');

    // Show success
    currentOrder=result.data;
    document.getElementById('successCard').innerHTML=`
      <div class="row"><span class="label">订单编号</span><span class="val">${result.data.order_no}</span></div>
      <div class="row"><span class="label">桌号</span><span class="val">${result.data.table_no}号桌</span></div>
      <div class="row"><span class="label">支付金额</span><span class="val" style="color:#c57b57;font-weight:700">¥${result.data.total_amount}</span></div>
      <div class="row"><span class="label">下单时间</span><span class="val">${new Date().toLocaleTimeString()}</span></div>
    `;
    cart={};
    updateCart();
    showScreen(4);
  }catch(e){
    toast(e.message||'提交失败，请稍后重试');
  }finally{
    btn.disabled=false;
    document.getElementById('loading').style.display='none';
  }
}

// ===== NAV =====
function showScreen(idx){
  document.querySelectorAll('.screen').forEach((s,i)=>s.classList.toggle('active',i===idx));
  window.scrollTo({top:0,behavior:'smooth'});
}
function goTable(){showScreen(1)}
function goMenu(){
  document.getElementById('orderNote').value='';
  document.querySelectorAll('.cat-tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  currentCat='pot';renderDishes('pot');
  showScreen(2);
}
function goHome(){showScreen(0)}

// ===== TOAST =====
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}
</script>
</body>
</html>
